<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 96" width="720" height="192" role="img" aria-label="DiamondAI">
  <title>DiamondAI wordmark — for light backgrounds</title>
  <g transform="translate(-5.2 1.2) scale(0.8)">
    <polygon points="30,27 70,27 60,49 40,49" fill="#e9e9ec"></polygon>
    <polygon points="30,27 40,49 14,49" fill="#bcbcc0"></polygon>
    <polygon points="70,27 86,49 60,49" fill="#d4d4d7"></polygon>
    <polygon points="14,49 40,49 50,90" fill="#4d8bff"></polygon>
    <polygon points="40,49 60,49 50,90" fill="#dcdcdf"></polygon>
    <polygon points="60,49 86,49 50,90" fill="#ff4b51"></polygon>
    <g stroke="#6e6e73" stroke-width="1.1" stroke-linejoin="round" opacity="0.5" fill="none">
