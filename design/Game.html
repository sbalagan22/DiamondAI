<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DiamondAI — Live game</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <script>
    (function () {
      try {
        var t = localStorage.getItem('diamondai-theme');
        if (t) document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Archivo', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            display: ['Bricolage Grotesque', 'Archivo', 'sans-serif'],
            mono: ['IBM Plex Mono', 'ui-monospace', 'monospace'],
          },
        },
      },
    };
  </script>

  <style>
    .font-mono { font-feature-settings: "tnum" 1; }
    .tabular-nums { font-variant-numeric: tabular-nums; }
  </style>
  <link rel="stylesheet" href="prototype/theme.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <!-- liquid-glass refraction: feTurbulence -> feDisplacementMap bends the backdrop -->
  <svg width="0" height="0" style="position:absolute;pointer-events:none" aria-hidden="true">
    <filter id="liquid-glass" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.009 0.011" numOctaves="2" seed="42" result="noise" />
      <feGaussianBlur in="noise" stdDeviation="1.4" result="soft" />
      <feDisplacementMap in="SourceGraphic" in2="soft" scale="42" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </svg>
  <div id="root"></div>

  <script type="text/babel" src="prototype/data.jsx"></script>
  <script type="text/babel" src="prototype/components.jsx"></script>
  <script type="text/babel" src="prototype/game.jsx"></script>
  <script type="text/babel" src="prototype/game-app.jsx"></script>
</body>
</html>
