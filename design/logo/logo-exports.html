<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DiamondAI logo — exports</title>
<style>
  body { margin:0; font-family: ui-sans-serif, system-ui, sans-serif; background:#1c1c1e; color:#f6f6f7; }
  .wrap { max-width: 980px; margin: 0 auto; padding: 40px 24px 80px; }
  h1 { font-size: 16px; letter-spacing:.04em; color:#adadb2; font-weight:600; text-transform:uppercase; margin:0 0 24px; }
  h2 { font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:#76767b; margin:36px 0 12px; font-family: ui-monospace, monospace; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .cell { border-radius:16px; display:grid; place-items:center; min-height:180px; padding:28px; }
  .light { background:#ececed; }
  .dark { background:#1b1b1d; box-shadow: inset 0 0 0 1px rgba(255,255,255,.08); }
  .checker { background:
      conic-gradient(#0000 90deg, #ffffff14 0 180deg, #0000 0 270deg, #ffffff14 0) 0 0/28px 28px,
      #3a3a3c; }
  .row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  img.mark { width:120px; height:120px; display:block; }
  img.word { width:300px; height:auto; display:block; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>DiamondAI · SVG exports (transparent)</h1>

    <h2>Mark — logo/DiamondAI-mark.svg</h2>
    <div class="grid">
      <div class="cell light"><img class="mark" src="DiamondAI-mark.svg" alt="mark light" /></div>
      <div class="cell dark"><img class="mark" src="DiamondAI-mark.svg" alt="mark dark" /></div>
      <div class="cell checker" style="grid-column:1 / -1"><img class="mark" src="DiamondAI-mark.svg" alt="mark transparency" /></div>
    </div>

    <h2>Wordmark — light file on light · dark file on dark</h2>
    <div class="row">
      <div class="cell light"><img class="word" src="DiamondAI-wordmark.svg" alt="wordmark light" /></div>
      <div class="cell dark"><img class="word" src="DiamondAI-wordmark-dark.svg" alt="wordmark dark" /></div>
    </div>
  </div>
</body>
</html>
